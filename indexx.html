<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOS Clothing Replica</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <!-- Header -->
  <div id="header"></div>

  <!-- Hero Banner -->
  <section id="hero">
    <h2>Summer Collection</h2>
    <p>Luxury African craftsmanship meets modern elegance</p>
    <button>Shop Now</button>
  </section>

  <!-- Product Grid -->
  <section id="products">
    <h2>Best Sellers</h2>
    <div class="product-grid">
      <div class="product">
        <img src="assets/img/product1.jpg" alt="Product 1">
        <h3>Mesh Dress</h3>
        <p>₦45,000</p>
      </div>
      <div class="product">
        <img src="assets/img/product2.jpg" alt="Product 2">
        <h3>Kaftan</h3>
        <p>₦60,000</p>
      </div>
      <div class="product">
        <img src="assets/img/product3.jpg" alt="Product 3">
        <h3>Co-ord Set</h3>
        <p>₦55,000</p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <div id="footer"></div>

  <script src="assets/js/main.js"></script>
</body>
</html>
